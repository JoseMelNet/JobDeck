<section id="profile-cv-preview" class="panel cv-panel"{% if cv_preview_oob %} hx-swap-oob="outerHTML"{% endif %}>
    <div class="section-title">
        <div>
            <h2>Vista CV</h2>
            <p>Vista de solo lectura del perfil consolidado para revisar como se presentaria tu hoja de vida.</p>
        </div>
    </div>
    {% if cv_preview_html %}
        {{ cv_preview_html | safe }}
    {% else %}
        <div class="empty-panel">
            <h3>Sin vista CV disponible</h3>
            <p>Completa los datos principales del perfil para generar esta vista.</p>
        </div>
    {% endif %}
</section>
