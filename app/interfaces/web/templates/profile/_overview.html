<section class="summary-strip profile-summary-strip">
    <article class="summary-card"><div class="summary-label">Skills</div><div class="summary-value">{{ skills|length }}</div></article>
    <article class="summary-card"><div class="summary-label">Experiencias</div><div class="summary-value">{{ experiences|length }}</div></article>
    <article class="summary-card"><div class="summary-label">Formacion</div><div class="summary-value">{{ education|length + courses|length + certifications|length }}</div></article>
</section>
