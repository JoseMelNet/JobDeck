<section class="panel">
    <div class="section-title">
        <div>
            <h2>Datos principales</h2>
            <p>Estos datos alimentan el analisis de vacantes y el resumen general del perfil.</p>
        </div>
    </div>
    <p class="section-caption">Los campos de esta seccion son la base del perfil y del contexto que consume el analizador.</p>
    <form class="stack-form" method="post" action="/app/profile/save" hx-post="/app/profile/save" hx-target="#profile-shell" hx-swap="innerHTML">
        <div class="grid-two">
            <label><span>Nombre completo</span><input type="text" name="nombre" placeholder="Ej. Jose Martinez" value="{{ profile.nombre if profile else '' }}"></label>
            <label><span>Titulo profesional</span><input type="text" name="titulo_profesional" placeholder="Ej. Data Analyst | BI | SQL" value="{{ profile.titulo_profesional if profile else '' }}"></label>
        </div>
        <div class="grid-two">
            <label><span>Ciudad</span><input type="text" name="ciudad" placeholder="Ej. Bogota" value="{{ profile.ciudad if profile else '' }}"></label>
            <label><span>Celular</span><input type="text" name="celular" placeholder="Ej. 3001234567" value="{{ profile.celular if profile else '' }}"></label>
        </div>
        <label><span>Direccion</span><input type="text" name="direccion" placeholder="Opcional" value="{{ profile.direccion if profile else '' }}"></label>
        <div class="grid-two">
            <label><span>Correo</span><input type="email" name="correo" value="{{ profile.correo if profile else '' }}"></label>
            <label>
                <span>Nivel actual</span>
                <select name="nivel_actual">
                    {% for option in level_options %}
                        <option value="{{ option }}"{% if profile and profile.nivel_actual == option %} selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>
            </label>
        </div>
        <div class="grid-two">
            <label><span>LinkedIn</span><input type="url" name="perfil_linkedin" placeholder="https://linkedin.com/in/..." value="{{ profile.perfil_linkedin if profile else '' }}"></label>
            <label><span>GitHub</span><input type="url" name="perfil_github" placeholder="https://github.com/..." value="{{ profile.perfil_github if profile else '' }}"></label>
        </div>
        <div class="grid-three">
            <label><span>Anios de experiencia</span><input type="number" min="0" name="anos_experiencia" value="{{ profile.anos_experiencia if profile and profile.anos_experiencia is not none else 0 }}"></label>
            <label><span>Salario minimo</span><input type="number" min="0" name="salario_min" value="{{ profile.salario_min if profile and profile.salario_min is not none else '' }}"></label>
            <label><span>Salario maximo</span><input type="number" min="0" name="salario_max" value="{{ profile.salario_max if profile and profile.salario_max is not none else '' }}"></label>
        </div>
        <div class="grid-two">
            <label><span>Moneda</span><input type="text" name="moneda" value="{{ profile.moneda if profile else 'COP' }}"></label>
            <fieldset class="checkbox-group">
                <legend>Modalidades aceptadas</legend>
                <div class="checkbox-list">
                    {% for option in modality_options %}
                        <label class="checkbox-item"><input type="checkbox" name="modalidades_aceptadas" value="{{ option }}"{% if option in selected_modalities %} checked{% endif %}><span>{{ option }}</span></label>
                    {% endfor %}
                </div>
            </fieldset>
        </div>
        <button type="submit">Guardar perfil</button>
    </form>
</section>
