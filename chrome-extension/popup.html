<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVs-Optimizador</title>
  <style>
    /* ── Reset y base ───────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      width: 100%;
      min-width: 320px;
      min-height: 100vh;
      padding: 0;
    }

    .shell {
      width: min(100%, 460px);
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 100%);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1e40af;
    }
    .header-logo {
      font-size: 1.4rem;
    }
    .header-text h1 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .header-text p {
      font-size: 0.65rem;
      color: #93c5fd;
      margin-top: 1px;
    }

    /* ── Status bar ──────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      font-size: 0.65rem;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok       { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .status-dot.error    { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .status-dot.checking { background: #f59e0b; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Contenido principal ─────────────────────────────────── */
    .content {
      padding: 14px 16px;
    }

    /* ── Alerta de página incorrecta ─────────────────────────── */
    .alert {
      background: #1e293b;
      border: 1px solid #334155;
      border-left: 3px solid #f59e0b;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 0.75rem;
      line-height: 1.6;
      color: #94a3b8;
    }
    .alert strong { color: #fbbf24; }

    /* ── Campos extraídos ────────────────────────────────────── */
    .field {
      margin-bottom: 10px;
    }
    .field label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.62rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .field-status {
      font-size: 0.6rem;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }
    .field-status.ok    { background: #14532d; color: #4ade80; }
    .field-status.warn  { background: #451a03; color: #fbbf24; }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.78rem;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #3b82f6;
    }
    .field textarea {
      resize: vertical;
      min-height: 80px;
      max-height: 180px;
      line-height: 1.5;
    }
    .field select option {
      background: #1e293b;
    }

    /* ── Grid de campos cortos ───────────────────────────────── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Botón principal ─────────────────────────────────────── */
    .btn-guardar {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn-guardar:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-guardar:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ── Toast de resultado ──────────────────────────────────── */
    .toast {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      line-height: 1.5;
    }
    .toast.success {
      background: #14532d;
      border: 1px solid #166534;
      color: #4ade80;
    }
    .toast.error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
    }
    .toast.info {
      background: #172554;
      border: 1px solid #1d4ed8;
      color: #93c5fd;
    }

    /* ── Loading spinner ─────────────────────────────────────── */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      border: none;
      border-top: 1px solid #1e293b;
      margin: 12px 0;
    }

    /* ── Calidad de extracción ───────────────────────────────── */
    .calidad-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .calidad-chip {
      font-size: 0.6rem;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 600;
    }
    .calidad-chip.ok   { background: #14532d55; color: #4ade80; border: 1px solid #14532d; }
    .calidad-chip.warn { background: #45210455; color: #fbbf24; border: 1px solid #451a03; }

    .analysis-panel {
      margin-top: 14px;
      padding: 12px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
    }
    .analysis-panel h3 {
      font-size: 0.82rem;
      color: #fff;
      margin-bottom: 10px;
    }
    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .analysis-card {
      background: #1f2937;
      border-radius: 6px;
      padding: 8px;
    }
    .analysis-card-label {
      font-size: 0.6rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .analysis-card-value {
      font-size: 0.82rem;
      color: #f8fafc;
      font-weight: 700;
    }
    .analysis-copy {
      font-size: 0.74rem;
      color: #cbd5e1;
      line-height: 1.5;
      margin-top: 8px;
    }
    .analysis-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .analysis-tag {
      font-size: 0.64rem;
      padding: 3px 7px;
      border-radius: 999px;
      background: #1d4ed833;
      border: 1px solid #1d4ed8;
      color: #bfdbfe;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="shell">
    <div class="header">
      <div class="header-logo">📋</div>
      <div class="header-text">
        <h1>CVs-Optimizador</h1>
        <p>Guardar vacante desde LinkedIn</p>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-dot checking" id="statusDot"></div>
      <span id="statusText">Verificando API local...</span>
    </div>

    <!-- Contenido -->
    <div class="content" id="mainContent">
      <div class="spinner" id="loadingSpinner" style="display:block; margin: 30px auto;"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
